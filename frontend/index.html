<!DOCTYPE html>
<html>
<head>
<title>3 Men's Morris</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Arial, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

h1 {
    font-size: 2rem;
    margin-bottom: 8px;
    color: #e2b96f;
    letter-spacing: 2px;
}

.subtitle {
    color: #888;
    margin-bottom: 40px;
    font-size: 0.95rem;
}

/* ---- LOBBY ---- */
#lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 320px;
}

.card {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    text-align: center;
}

.card h2 {
    font-size: 1rem;
    color: #e2b96f;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.btn {
    padding: 12px 28px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: bold;
    transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: #e2b96f; color: #1a1a2e; }
.btn-secondary { background: #0f3460; color: #eee; }

.code-input {
    display: flex;
    gap: 8px;
    margin-top: 4px;
}

input[type="text"] {
    flex: 1;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #0f3460;
    background: #0d0d1a;
    color: #eee;
    font-size: 1.2rem;
    letter-spacing: 6px;
    text-align: center;
    width: 100%;
}
input[type="text"]::placeholder {
    letter-spacing: 2px;
    font-size: 0.9rem;
    color: #444;
}

.divider {
    color: #444;
    font-size: 0.85rem;
}

/* ---- WAITING ---- */
#waiting {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    text-align: center;
}

.big-code {
    font-size: 3.5rem;
    font-weight: bold;
    letter-spacing: 12px;
    color: #e2b96f;
    background: #16213e;
    padding: 20px 36px;
    border-radius: 16px;
    border: 2px dashed #e2b96f;
}

.copy-btn {
    background: none;
    border: 1px solid #e2b96f;
    color: #e2b96f;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
}
.copy-btn:hover { background: #e2b96f22; }

.pulse {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #888;
    font-size: 0.9rem;
}
.dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #e2b96f;
    animation: pulse 1.2s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
}

/* ---- GAME ---- */
#game {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
}

#status {
    font-size: 1.1rem;
    color: #e2b96f;
    min-height: 28px;
    font-weight: bold;
}

.player-badge {
    display: flex;
    gap: 24px;
    font-size: 0.9rem;
}
.badge {
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: bold;
}
.badge-x { background: #1a3a6e; color: #6ab0ff; }
.badge-o { background: #3a1a1a; color: #ff6a6a; }
.badge.active { outline: 2px solid #e2b96f; }

svg {
    background: #16213e;
    border-radius: 12px;
    padding: 20px;
}

.vertex {
    fill: #0d0d1a;
    stroke: #e2b96f;
    stroke-width: 2;
    cursor: pointer;
}
.vertex:hover { fill: #e2b96f33; }

.piece { stroke-width: 2; cursor: pointer; }
.selected { stroke: #fff; stroke-width: 4; filter: drop-shadow(0 0 6px #fff); }

#error-msg {
    color: #ff6a6a;
    font-size: 0.9rem;
    min-height: 20px;
}

.room-code-small {
    font-size: 0.8rem;
    color: #444;
}
</style>
</head>
<body>

<h1>3 Men's Morris</h1>
<p class="subtitle">Classic strategy for two players</p>

<!-- LOBBY -->
<div id="lobby">
    <div class="card">
        <h2>Host a Game</h2>
        <p style="color:#888;font-size:0.85rem;margin-bottom:14px;">Generate a code and share it with your friend</p>
        <button class="btn btn-primary" onclick="hostGame()">Generate Code</button>
    </div>

    <div class="divider">— or —</div>

    <div class="card">
        <h2>Join a Game</h2>
        <p style="color:#888;font-size:0.85rem;margin-bottom:14px;">Enter the 4-digit code from your friend</p>
        <div class="code-input">
            <input type="text" id="joinCode" maxlength="4" placeholder="1234" />
        </div>
        <br/>
        <button class="btn btn-secondary" onclick="joinGame()">Join Game</button>
    </div>

    <p id="error-msg"></p>
</div>

<!-- WAITING FOR OPPONENT -->
<div id="waiting">
    <p style="color:#888">Share this code with your friend:</p>
    <div class="big-code" id="displayCode">----</div>
    <button class="copy-btn" onclick="copyCode()">📋 Copy Code</button>
    <div class="pulse"><div class="dot"></div> Waiting for opponent to join...</div>
</div>

<!-- GAME BOARD -->
<div id="game">
    <div class="player-badge">
        <div class="badge badge-x" id="badge-x">🔵 You (X)</div>
        <div class="badge badge-o" id="badge-o">🔴 Opponent (O)</div>
    </div>
    <p id="status">...</p>

    <svg width="340" height="340">
        <!-- grid lines -->
        <line x1="60" y1="60"  x2="280" y2="60"  stroke="#e2b96f" stroke-width="1" opacity="0.4"/>
        <line x1="60" y1="170" x2="280" y2="170" stroke="#e2b96f" stroke-width="1" opacity="0.4"/>
        <line x1="60" y1="280" x2="280" y2="280" stroke="#e2b96f" stroke-width="1" opacity="0.4"/>
        <line x1="60"  y1="60" x2="60"  y2="280" stroke="#e2b96f" stroke-width="1" opacity="0.4"/>
        <line x1="170" y1="60" x2="170" y2="280" stroke="#e2b96f" stroke-width="1" opacity="0.4"/>
        <line x1="280" y1="60" x2="280" y2="280" stroke="#e2b96f" stroke-width="1" opacity="0.4"/>
        <!-- diagonals -->
        <line x1="60"  y1="60"  x2="280" y2="280" stroke="#e2b96f" stroke-width="1" opacity="0.4"/>
        <line x1="280" y1="60"  x2="60"  y2="280" stroke="#e2b96f" stroke-width="1" opacity="0.4"/>

        <!-- vertices -->
        <circle class="vertex" cx="60"  cy="60"  r="12" data-pos="1"/>
        <circle class="vertex" cx="170" cy="60"  r="12" data-pos="2"/>
        <circle class="vertex" cx="280" cy="60"  r="12" data-pos="3"/>
        <circle class="vertex" cx="60"  cy="170" r="12" data-pos="4"/>
        <circle class="vertex" cx="170" cy="170" r="12" data-pos="5"/>
        <circle class="vertex" cx="280" cy="170" r="12" data-pos="6"/>
        <circle class="vertex" cx="60"  cy="280" r="12" data-pos="7"/>
        <circle class="vertex" cx="170" cy="280" r="12" data-pos="8"/>
        <circle class="vertex" cx="280" cy="280" r="12" data-pos="9"/>
    </svg>

    <p class="room-code-small" id="roomCodeSmall"></p>
</div>

<script>
const wsHost = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
    ? "ws://127.0.0.1:5000"
    : `wss://${window.location.hostname}`
let socket = null
let playerSymbol = null
let selected = null
let boardState = Array(9).fill(null)
let gameCode = null

function showError(msg) {
    document.getElementById("error-msg").textContent = msg
}

function connectSocket(onOpen) {
    socket = new WebSocket(wsHost)
    socket.onopen = onOpen
    socket.onmessage = handleMessage
    socket.onerror = () => showError("Connection failed. Is the server running?")
}

function hostGame() {
    showError("")
    connectSocket(() => {
        socket.send(JSON.stringify({ action: "host" }))
    })
}

function joinGame() {
    showError("")
    const code = document.getElementById("joinCode").value.trim()
    if (code.length !== 4 || !/^\d{4}$/.test(code)) {
        showError("Please enter a valid 4-digit code.")
        return
    }
    connectSocket(() => {
        socket.send(JSON.stringify({ action: "join", code }))
    })
}

function copyCode() {
    navigator.clipboard.writeText(gameCode)
        .then(() => {
            const btn = document.querySelector(".copy-btn")
            btn.textContent = "✅ Copied!"
            setTimeout(() => btn.textContent = "📋 Copy Code", 2000)
        })
}

function handleMessage(event) {
    const data = JSON.parse(event.data)

    if (data.type === "error") {
        showError(data.message)
        return
    }

    if (data.type === "hosted") {
        gameCode = data.code
        playerSymbol = data.symbol
        document.getElementById("displayCode").textContent = data.code
        document.getElementById("lobby").style.display = "none"
        document.getElementById("waiting").style.display = "flex"
    }

    if (data.type === "joined") {
        playerSymbol = data.symbol
        // Flip badges for O player
        document.getElementById("badge-x").textContent = "🔵 Opponent (X)"
        document.getElementById("badge-o").textContent = "🔴 You (O)"
    }

    if (data.type === "wait") {
        // already shown
    }

    if (data.type === "start") {
        document.getElementById("lobby").style.display = "none"
        document.getElementById("waiting").style.display = "none"
        document.getElementById("game").style.display = "flex"
        document.getElementById("roomCodeSmall").textContent = `Room: ${gameCode || document.getElementById("joinCode").value}`
        document.getElementById("status").textContent = "Game started!"
    }

    if (data.type === "board") {
        boardState = data.board
        updateTurnBadge(data.turn)
        if (data.turn === playerSymbol) {
            document.getElementById("status").textContent = "Your turn"
        } else {
            document.getElementById("status").textContent = "Opponent's turn..."
        }
        drawBoard(boardState)
    }

    if (data.type === "win") {
        drawBoard(boardState)
        const youWon = data.player === playerSymbol
        document.getElementById("status").textContent = youWon ? "🎉 You win!" : "😞 You lose!"
        setTimeout(() => {
            if (confirm(youWon ? "You win! Play again?" : "You lose. Play again?")) {
                location.reload()
            }
        }, 800)
    }
}

function updateTurnBadge(turn) {
    document.getElementById("badge-x").classList.toggle("active", turn === "X")
    document.getElementById("badge-o").classList.toggle("active", turn === "O")
}

function drawBoard(board) {
    const svg = document.querySelector("svg")
    document.querySelectorAll(".piece").forEach(p => p.remove())

    board.forEach((value, index) => {
        if (!value) return
        const vertex = document.querySelector(`circle.vertex[data-pos="${index+1}"]`)
        const cx = vertex.getAttribute("cx")
        const cy = vertex.getAttribute("cy")

        const piece = document.createElementNS("http://www.w3.org/2000/svg", "circle")
        piece.setAttribute("class", "piece")
        piece.setAttribute("data-pos", index + 1)
        piece.setAttribute("cx", cx)
        piece.setAttribute("cy", cy)
        piece.setAttribute("r", 16)
        piece.setAttribute("stroke", value === "X" ? "#6ab0ff" : "#ff6a6a")
        piece.setAttribute("fill", value === "X" ? "#1a3a6e" : "#3a1a1a")
        svg.appendChild(piece)
    })
}

// Single delegated click handler
document.querySelector("svg").addEventListener("click", function(e) {
    if (!socket || socket.readyState !== WebSocket.OPEN) return
    const target = e.target.closest("[data-pos]")
    if (!target) return

    const pos = parseInt(target.dataset.pos)
    const placed = boardState.filter(v => v !== null).length

    // Placement phase
    if (placed < 6) {
        socket.send(JSON.stringify(pos))
        return
    }

    // Movement phase — select
    if (selected === null) {
        if (boardState[pos - 1] === playerSymbol) {
            selected = pos
            const piece = document.querySelector(`.piece[data-pos="${pos}"]`)
            if (piece) piece.classList.add("selected")
        }
        return
    }

    // Deselect
    if (selected === pos) {
        const old = document.querySelector(".selected")
        if (old) old.classList.remove("selected")
        selected = null
        return
    }

    // Move
    socket.send(JSON.stringify({ from: selected, to: pos }))
    const old = document.querySelector(".selected")
    if (old) old.classList.remove("selected")
    selected = null
})

// Allow pressing Enter in the join input
document.getElementById("joinCode").addEventListener("keydown", e => {
    if (e.key === "Enter") joinGame()
})
</script>
</body>
</html>
